name: CI — Testes e Validação

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, staging, main]

env:
  PYTHON_VERSION: "3.11"
  CLICKHOUSE_HOST: localhost
  CLICKHOUSE_PORT: 9000

jobs:
  # ──────────────────────────────────────────
  # Job 1: Qualidade de Código
  # ──────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Black formatting check
        run: black --check --diff .

      - name: Ruff linting
        run: ruff check .

      - name: MyPy type checking
        run: mypy dags/ scripts/ --ignore-missing-imports

      - name: Bandit security scan
        run: bandit -r dags/ scripts/ -ll

  # ──────────────────────────────────────────
  # Job 2: Testes Unitários
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=dags \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────
  # Job 3: Validação de DAGs Airflow
  # ──────────────────────────────────────────
  validate-dags:
    name: Validate DAGs
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow
        run: |
          pip install apache-airflow==2.9.* \
            apache-airflow-providers-http \
            apache-airflow-providers-postgres \
            clickhouse-connect

      - name: Validate DAG imports (sem erros de sintaxe)
        run: |
          python -c "
          import os, importlib.util, sys
          dag_dir = 'dags'
          errors = []
          for root, dirs, files in os.walk(dag_dir):
              for f in files:
                  if f.endswith('.py') and not f.startswith('_'):
                      path = os.path.join(root, f)
                      spec = importlib.util.spec_from_file_location('module', path)
                      mod = importlib.util.module_from_spec(spec)
                      try:
                          spec.loader.exec_module(mod)
                          print(f'✅ {path}')
                      except Exception as e:
                          errors.append(f'❌ {path}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'\n✅ {len([f for f in os.listdir(dag_dir) if f.endswith(\".py\")])} DAGs validadas')
          "

  # ──────────────────────────────────────────
  # Job 4: Validação dbt
  # ──────────────────────────────────────────
  validate-dbt:
    name: Validate dbt
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: |
          pip install dbt-core dbt-clickhouse

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt parse (valida SQL sem executar)
        working-directory: dbt
        run: dbt parse --profiles-dir . --profile ci
        env:
          DBT_CLICKHOUSE_HOST: localhost

  # ──────────────────────────────────────────
  # Job 5: Verificação de Segredos
  # ──────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # Status final (requerido para merge)
  # ──────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, validate-dags, validate-dbt, secret-scan]
    steps:
      - run: echo "✅ Todos os checks de CI passaram!"
